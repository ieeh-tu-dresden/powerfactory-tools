name: Test code

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_call:

jobs:
  check-code:
    uses: ./.github/workflows/check-code.yml
  test-code:
    name: Test code
    runs-on: ubuntu-latest
    needs: [check-code]
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1

      - name: Cache the default location where Cargo installs the binaries for Rust tools (uv) and dependencies
        id: cache-cargo-bin
        uses: actions/cache@0c907a75c2c80ebcb7f088228285e798b750cf8f  # v4.2.1
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin
      
      - name: Install uv and set the python version
        id: setup-uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.21"  # install a specific version of uv
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: uv venv --python ${{ matrix.python-version }} && uv sync

      - name: Unit test using pytest ${{ matrix.python-version }}
        run: uv run pytest